<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System Viewer (JavaScript)</title>
  <style>
    :root {
      --bg: #050914;
      --panel: rgba(13, 21, 38, 0.88);
      --panel-border: rgba(119, 160, 231, 0.4);
      --text: #dce8ff;
      --muted: #9ab0d9;
      --accent: #72c2ff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(1200px 800px at 20% 15%, #0e1c3a 0%, transparent 60%), var(--bg);
      color: var(--text);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .hud {
      position: absolute;
      left: 12px;
      top: 10px;
      max-width: min(820px, calc(100% - 24px));
      padding: 10px 12px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      border-radius: 10px;
      backdrop-filter: blur(4px);
      line-height: 1.35;
      font-size: 13px;
      color: var(--muted);
    }

    .hud strong {
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .hud kbd {
      background: rgba(116, 152, 214, 0.2);
      border: 1px solid rgba(129, 170, 240, 0.5);
      border-radius: 4px;
      padding: 0 5px;
      color: var(--text);
      font-size: 12px;
      font-family: Consolas, "Courier New", monospace;
    }

    .status {
      margin-top: 5px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .speed-row {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      flex-wrap: wrap;
    }

    .speed-row input[type="range"] {
      width: 260px;
    }

    .speed-row button {
      background: rgba(116, 152, 214, 0.2);
      border: 1px solid rgba(129, 170, 240, 0.5);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>
    <div class="hud">
      <strong>Solar System Viewer (JS)</strong><br />
      Orbit: <kbd>RMB drag</kbd> | Pan: <kbd>MMB drag</kbd> | Zoom: <kbd>Wheel</kbd> |
      Select: <kbd>LMB</kbd> | Lock: <kbd>Double LMB</kbd><br />
      Toggle: <kbd>R</kbd> orbits, <kbd>M</kbd> moons, <kbd>B</kbd> belts, <kbd>L</kbd> Lagrange |
      Lock shortcuts: <kbd>S</kbd> Sun, <kbd>E</kbd> Earth | Cycle pair: <kbd>O</kbd>/<kbd>P</kbd> |
      Unlock: <kbd>Esc</kbd><br />
      <div class="speed-row">
        <label for="speedSlider"><strong>Speed (days/s):</strong></label>
        <input id="speedSlider" type="range" min="0" max="30" step="0.01" value="2" />
        <span id="speedValue">2.00</span>
        <button id="pauseBtn" type="button">Pause</button>
        <span>Toggle: <kbd>Space</kbd></span>
      </div>
      <div class="status" id="statusLine">Initializing simulation...</div>
    </div>
  </div>
  <script src="./script.js?v=20260223-1"></script>
</body>
</html>
